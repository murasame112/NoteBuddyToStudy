<div id="container" *ngIf="authService.currentUserSignal()">
  <nav>
    <app-navbar></app-navbar>
  </nav>

  <main>
    <i
      class="fa-solid fa-spinner fa-spin-pulse fa-2xl"
      style="color: #ffbb00"
      *ngIf="isLoading"
      id="spinner"
    ></i>
    <button id="backBtn" routerLink="/notes">powrót</button>
    <div id="myNotes">
      <p id="title">Moje notatki:</p>

      <div id="myNotesContainer" *ngIf="!isLoading">
        <ng-container *ngIf="myNotes.length != 0">
          <div class="myNote" *ngFor="let myNote of myNotes">
            <app-notes-model
              [finalNote]="myNote"
              [userFavNotes]="userSavedNotesIds"
              [userNotesRates]="userNotesReviews"
              [userId]="userId"
            ></app-notes-model>

            <div class="editBtns">
              <button
                class="editBtnsStyle editNoteBtn"
                routerLink="/editNote/{{ myNote.note_id }}"
              >
                edytuj
              </button>
              <button
                class="editBtnsStyle deleteNoteBtn"
                (click)="deleteNote(myNote.note_id)"
              >
                usuń
              </button>
            </div>
          </div>
        </ng-container>

        <ng-container *ngIf="myNotes.length === 0">
          <span>Brak notatek</span>
        </ng-container>
      </div>
    </div>
  </main>

  <footer>
    <app-footer></app-footer>
  </footer>
</div>
