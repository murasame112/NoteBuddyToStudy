<div id="container">
  <div id="chat">
    <!-- <div *ngFor="let message of messageList">
      <li>
        {{ message }}
      </li>
    </div> -->

    <div *ngFor="let message of list">
      <div
        class="direction"
        [ngClass]="{ currentUser: user === message.login }"
      >
        <div class="mess">
          <span class="login"> {{ message.login }}</span
          >: {{ message.content }}
          {{ message.date | date : "hh:mm" }}
        </div>
      </div>
    </div>
  </div>

  <input
    [(ngModel)]="newMessage"
    (keyup)="$event.keyCode == 13 && sendMessage()"
  />
  <button (click)="sendMessage()">Send Message</button>
</div>
