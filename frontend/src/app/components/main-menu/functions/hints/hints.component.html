<div id="container" *ngIf="authService.currentUserSignal()">
  <nav>
    <app-navbar></app-navbar>
  </nav>

  <main>
    <i
      class="fa-solid fa-spinner fa-spin-pulse fa-2xl"
      style="color: #ffbb00"
      *ngIf="isLoading"
      id="spinner"
    ></i>
    <button id="backBtn" routerLink="/notes">powrót</button>
    <div id="hint">
      <p id="title">Porady, które mogą ci się przydać:</p>

      <ng-container *ngFor="let hint of hintsOrigin">
        <app-hint-model [hintContent]="hint"></app-hint-model>
      </ng-container>
    </div>
  </main>

  <footer>
    <app-footer></app-footer>
  </footer>
</div>
