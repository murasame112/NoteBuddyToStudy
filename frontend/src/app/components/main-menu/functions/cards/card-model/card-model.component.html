<div id="container" (click)="toggleCard()">
  <div class="content">
    <span class="contentSpan">{{
      questionVisible ? "Pytanie:" : "Odpowiedź:"
    }}</span>
    <p class="contentP">
      {{
        questionVisible
          ? cardContent?.question || myCardContent?.question
          : cardContent?.answer || myCardContent?.answer
      }}
    </p>
  </div>
</div>
