<div id="container">
  <nav>
    <app-navbar></app-navbar>
  </nav>

  <main>
    <button id="backBtn" routerLink="/cards/{{ noteId }}">powrót</button>

    <h2 id="title_text">Nowa fiszka</h2>
    <form
      [formGroup]="addCardForm"
      (ngSubmit)="addCard(addCardForm.value)"
      id="addCard"
    >
      <div id="card_name" class="card_div">
        <label for="card_name_id" class="card_label">Treść fiszki:</label>
        <textarea
          type="text"
          placeholder="treść"
          formControlName="cardText"
          id="card_name_id"
          class="form-control"
        ></textarea>
      </div>

      <div id="card_answer" class="card_div">
        <label for="card_answer_id" class="card_label">Odpowiedź:</label>
        <textarea
          type="text"
          placeholder="odpowiedź do fiszki"
          formControlName="cardAnswer"
          id="card_answer_id"
          class="form-control"
        ></textarea>
      </div>

      <button type="submit" id="addCardBtn">Dodaj fiszke</button>
    </form>
  </main>

  <footer>
    <app-footer></app-footer>
  </footer>
</div>
