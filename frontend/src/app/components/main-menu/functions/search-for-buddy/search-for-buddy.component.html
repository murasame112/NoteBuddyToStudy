<div id="chooseType">
  <input type="radio" class="btn-check" name="searchValue" id="searchOne" autocomplete="off"  formControlName="searchValue" value="0">
  <label class="btn btn-secondary" for="searchOne">Partner/ka</label>


  <input type="radio" class="btn-check" name="searchValue" id="searchGroup" autocomplete="off" formControlName="searchValue" value="1">
  <label class="btn btn-secondary" for="searchGroup">Grupa</label>
</div>

    <div id="chooseCourse">

          <option value="" selected disabled hidden >Wybierz kierunek</option>

            <ng-container  *ngFor="let cat of category; let i = index">
             <option  [value]="cat">{{cat}}</option>
            </ng-container>


        </select>
      </div>

        <button type="submit" id="searchBuddyBtn">Wyszukaj</button>
