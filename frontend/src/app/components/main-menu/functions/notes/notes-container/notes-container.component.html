<div id="container">
  <div id="noteTop">
    <div id="trustedAuthor">
      <i class="fa-solid fa-check fa-lg" style="color: #0ebe2c;"></i>
      <span>zaufany autor</span></div>
    <div id="hoverMenu">
      <i class="fa-solid fa-download fa-xl"></i>
      <i class="fa-solid fa-pen fa-xl"></i>
      <i class="fa-regular fa-star fa-xl"></i>
      <i class="fa-solid fa-up-right-and-down-left-from-center fa-xl"></i>
    </div>
  </div>

<span class="spans" id="name">{{data?.name}}</span>
<span class="spans" id="desc">{{data?.description}}</span>

<div id="categories">
  <span class="categoriesC" id="course">{{categoryName}}</span>
  <span class="categoriesC" id="subcategory">{{subCategoryName}}</span>
</div>


<div id="bottom">

  <div id="rates">
    <button class="ratesBtns">
      <span  id="likeNumber">{{data?.positive_reviews}}</span>
      <i class="fa fa-solid fa-thumbs-up fa-lg"></i>
    </button>

    <button class="ratesBtns">
      <span  id="dislikeNumber">{{data?.negative_reviews}}</span>
      <i class="fa-solid fa-thumbs-down fa-lg"></i>
    </button>
  </div>


  <div id="authorAndDate">
    <span  id="authorName">autor: <span id="authorColor">{{userName}}</span></span>
  <span  id="lastEditDate">Ostatnio aktualizowane: {{data?.last_edit_date}}</span>
  </div>

</div>


</div>
